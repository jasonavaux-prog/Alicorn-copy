<!DOCTYPE html>
<html>
<head>
    <title>GPS Visualization Lab</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        #map { height: 500px; width: 100%; border-radius: 8px; }
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
    </style>
</head>
<body>

    <h2>My GPS Data Visualization</h2>
    <p>Visualizing coordinates parsed from Python.</p>
    
    <div id="map"></div>

    <script>
// 1. Initialize Map
const map = L.map('map').setView([0, 0], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 2. State Management
let userMarker;
let pathHistory = []; // Our List to store [lat, lng] pairs
const polyline = L.polyline([], { color: 'blue' }).addTo(map); // The visual "line" object

// 3. The Watcher
navigator.geolocation.watchPosition((position) => {
    const { latitude, longitude } = position.coords;
    const currentPos = [latitude, longitude];

    // Add new coordinate to our History List
    pathHistory.push(currentPos);

    // Update the UI: Move the Marker
    if (!userMarker) {
        userMarker = L.marker(currentPos).addTo(map);
        map.setView(currentPos, 16); 
    } else {
        userMarker.setLatLng(currentPos);
    }

    // Update the UI: Redraw the line with the full history array
    polyline.setLatLngs(pathHistory);

}, (error) => {
    console.log(error);
}, {
    enableHighAccuracy: true
});
    </script>
</body>
</html>
